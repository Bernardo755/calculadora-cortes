<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optimizador de Cortes de Madera</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
    .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
    
    /* Panel lateral de controles */
    .sidebar { width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); flex-shrink: 0; }
    h2 { font-size: 18px; margin-bottom: 15px; color: #0f172a; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
    .group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
    input { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #2563eb; }
    .row { display: flex; gap: 10px; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
    button.clear { background: #ef4444; margin-top: 10px; }
    button.clear:hover { background: #dc2626; }
    
    /* Área del Tablero */
    .main-area { flex-grow: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .instructions { font-size: 13px; color: #64748b; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 6px; border-left: 4px solid #2563eb; }
    
    #board-container { width: 100%; height: 650px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 8px; border: 1px dashed #cbd5e1; overflow: hidden; position: relative; }
    #board { background: #e2e8f0; border: 2px solid #94a3b8; position: relative; transform-origin: center; }
    
    /* Piezas arrastrables */
    .piece { position: absolute; background: #3b82f6; color: white; border: 1px solid #1d4ed8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; text-align: center; cursor: move; user-select: none; border-radius: 3px; font-weight: 500; }
    .piece:hover { filter: brightness(1.1); }
    .piece span { pointer-events: none; }
  </style>
</head>
<body>

<div class="container">
  <!-- Panel de Configuración -->
  <div class="sidebar">
    <h2>1. Tablero Principal</h2>
    <div class="group row">
      <div>
        <label>Ancho (mm)</label>
        <input type="number" id="board-w" value="2440">
      </div>
      <div>
        <label>Alto (mm)</label>
        <input type="number" id="board-h" value="1220">
      </div>
    </div>
    
    <div class="group">
      <label>Grosor del disco / Margen (mm)</label>
      <input type="number" id="kerf" value="3">
    </div>

    <button onclick="updateBoard()">Actualizar Tablero</button>

    <h2 style="margin-top: 25px;">2. Agregar Piezas</h2>
    <div class="group">
      <label>Etiqueta / Nombre</label>
      <input type="text" id="piece-name" placeholder="Ej: Estante">
    </div>
    <div class="group row">
      <div>
        <label>Ancho (mm)</label>
        <input type="number" id="piece-w" value="600">
      </div>
      <div>
        <label>Alto (mm)</label>
        <input type="number" id="piece-h" value="400">
      </div>
    </div>
    <div class="group">
      <label>Cantidad</label>
      <input type="number" id="piece-qty" value="1" min="1">
    </div>
    <button onclick="addPieces()">+ Agregar Piezas</button>
    <button class="clear" onclick="clearPieces()">Limpiar Piezas</button>
  </div>

  <!-- Área Visual -->
  <div class="main-area">
    <div class="instructions">
      💡 <strong>Controles:</strong> Arrastra las piezas sobre el tablero para acomodarlas. Haz <strong>clic</strong> sobre una pieza para rotarla 90°. El borde discontinuo rojo indica el margen del disco de sierra.
    </div>
    <div id="board-container">
      <div id="board"></div>
    </div>
  </div>
</div>

<script>
  let scale = 1;
  let activePiece = null;
  let offsetX = 0, offsetY = 0;

  function updateBoard() {
    const board = document.getElementById('board');
    const container = document.getElementById('board-container');
    
    const bw = parseFloat(document.getElementById('board-w').value) || 1000;
    const bh = parseFloat(document.getElementById('board-h').value) || 1000;

    const maxW = container.clientWidth - 40;
    const maxH = container.clientHeight - 40;
    scale = Math.min(maxW / bw, maxH / bh);

    board.style.width = (bw * scale) + 'px';
    board.style.height = (bh * scale) + 'px';

    document.querySelectorAll('.piece').forEach(p => {
      p.style.outline = `${(parseFloat(document.getElementById('kerf').value) || 0) * scale}px dashed rgba(239, 68, 68, 0.6)`;
    });
  }

  function addPieces() {
    const baseName = document.getElementById('piece-name').value || 'Pieza';
    const pw = parseFloat(document.getElementById('piece-w').value);
    const ph = parseFloat(document.getElementById('piece-h').value);
    const qty = parseInt(document.getElementById('piece-qty').value) || 1;
    const kerf = parseFloat(document.getElementById('kerf').value) || 0;

    if (!pw || !ph || qty < 1) return alert('Por favor ingresa valores válidos.');

    const board = document.getElementById('board');

    // Bucle para crear la cantidad seleccionada de piezas
    for (let i = 0; i < qty; i++) {
      const piece = document.createElement('div');
      piece.className = 'piece';
      
      const displayName = qty > 1 ? `${baseName} #${i + 1}` : baseName;

      piece.dataset.w = pw;
      piece.dataset.h = ph;
      piece.dataset.name = displayName;

      piece.style.outline = `${kerf * scale}px dashed rgba(239, 68, 68, 0.6)`;
      piece.style.outlineOffset = '0px';

      updatePieceSize(piece);

      // Escalonar ligeramente las posiciones iniciales para que no queden 100% encimadas
      const offset = (i * 15) % 150;
      piece.style.left = (10 + offset) + 'px';
      piece.style.top = (10 + offset) + 'px';

      // Eventos de Arrastre y Rotación
      piece.addEventListener('mousedown', startDrag);
      piece.addEventListener('click', (e) => {
        if (piece.dataset.dragged === 'true') return;
        const currentW = parseFloat(piece.dataset.w);
        const currentH = parseFloat(piece.dataset.h);
        piece.dataset.w = currentH;
        piece.dataset.h = currentW;
        updatePieceSize(piece);
      });

      board.appendChild(piece);
    }
  }

  function updatePieceSize(piece) {
    const w = parseFloat(piece.dataset.w);
    const h = parseFloat(piece.dataset.h);
    piece.style.width = (w * scale) + 'px';
    piece.style.height = (h * scale) + 'px';
    piece.innerHTML = `<span><strong>${piece.dataset.name}</strong></span><span>${w} x ${h} mm</span>`;
  }

  function startDrag(e) {
    activePiece = e.currentTarget;
    activePiece.dataset.dragged = 'false';
    const rect = activePiece.getBoundingClientRect();
    
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.addEventListener('mousemove', drag);
    document.addEventListener('mouseup', stopDrag);
  }

  function drag(e) {
    if (!activePiece) return;
    activePiece.dataset.dragged = 'true';
    
    const boardRect = document.getElementById('board').getBoundingClientRect();
    let x = (e.clientX - boardRect.left - offsetX) / scale;
    let y = (e.clientY - boardRect.top - offsetY) / scale;

    const bw = parseFloat(document.getElementById('board-w').value);
    const bh = parseFloat(document.getElementById('board-h').value);
    const pw = parseFloat(activePiece.dataset.w);
    const ph = parseFloat(activePiece.dataset.h);

    x = Math.max(0, Math.min(x, bw - pw));
    y = Math.max(0, Math.min(y, bh - ph));

    activePiece.style.left = (x * scale) + 'px';
    activePiece.style.top = (y * scale) + 'px';
  }

  function stopDrag() {
    activePiece = null;
    document.removeEventListener('mousemove', drag);
    document.removeEventListener('mouseup', stopDrag);
  }

  function clearPieces() {
    document.getElementById('board').innerHTML = '';
  }

  window.onload = updateBoard;
  window.onresize = updateBoard;
</script>

</body>
</html>
