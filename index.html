<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cortes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 800px; width: 100%; display: flex; flex-wrap: wrap; gap: 20px; }
        .controls { flex: 1; min-width: 250px; }
        .visualization { flex: 2; min-width: 300px; display: flex; flex-direction: column; align-items: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; border: none; padding: 10px 15px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background-color: #1a252f; }
        canvas { border: 2px solid #2c3e50; max-width: 100%; height: auto; background-color: #ecf0f1; margin-top: 15px; }
        .results { margin-top: 15px; padding: 10px; background-color: #e8f8f5; border-left: 4px solid #1abc9c; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Calculadora de Cortes</h1>

    <div class="container">
        <div class="controls">
            <h3>Medidas de la Placa Principal</h3>
            <div class="input-group">
                <label>Ancho:</label>
                <input type="number" id="placaW" value="244">
            </div>
            <div class="input-group">
                <label>Alto:</label>
                <input type="number" id="placaH" value="122">
            </div>

            <h3>Medidas de la Pieza</h3>
            <div class="input-group">
                <label>Ancho:</label>
                <input type="number" id="piezaW" value="50">
            </div>
            <div class="input-group">
                <label>Alto:</label>
                <input type="number" id="piezaH" value="30">
            </div>

            <button onclick="calcular()">Calcular y Dibujar</button>

            <div id="resultado" class="results" style="display: none;"></div>
        </div>

        <div class="visualization">
            <canvas id="canvas" width="400" height="300"></canvas>
        </div>
    </div>

    <script>
        function calcular() {
            // 1. Obtener valores
            const W = parseFloat(document.getElementById('placaW').value);
            const H = parseFloat(document.getElementById('placaH').value);
            const w = parseFloat(document.getElementById('piezaW').value);
            const h = parseFloat(document.getElementById('piezaH').value);

            if (!W || !H || !w || !h || W <= 0 || H <= 0 || w <= 0 || h <= 0) {
                alert("Por favor ingresa medidas válidas mayores a 0.");
                return;
            }

            if ((w > W || h > H) && (w > H || h > W)) {
                alert("La pieza es más grande que la placa.");
                return;
            }

            // 2. Calcular Opción 1: Orientación Original
            const cols1 = Math.floor(W / w);
            const rows1 = Math.floor(H / h);
            const total1 = cols1 * rows1;

            // 3. Calcular Opción 2: Orientación Rotada (90 grados)
            const cols2 = Math.floor(W / h);
            const rows2 = Math.floor(H / w);
            const total2 = cols2 * rows2;

            let bestTotal, bestCols, bestRows, drawW, drawH;

            // 4. Elegir la orientación que rinda más piezas
            if (total1 >= total2) {
                bestTotal = total1;
                bestCols = cols1;
                bestRows = rows1;
                drawW = w;
                drawH = h;
            } else {
                bestTotal = total2;
                bestCols = cols2;
                bestRows = rows2;
                drawW = h; 
                drawH = w; 
            }

            // 5. Mostrar Resultados de texto
            const areaPlaca = W * H;
            const areaPiezas = bestTotal * (w * h);
            const aprovechamiento = ((areaPiezas / areaPlaca) * 100).toFixed(1);

            const resDiv = document.getElementById('resultado');
            resDiv.style.display = 'block';
            resDiv.innerHTML = `
                <strong>Total de piezas:</strong> ${bestTotal}<br>
                <strong>Aprovechamiento:</strong> ${aprovechamiento}%<br>
            `;

            // 6. Dibujar en el Canvas
            dibujar(W, H, drawW, drawH, bestCols, bestRows);
        }

        function dibujar(boardW, boardH, pieceW, pieceH, cols, rows) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Limpiar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calcular escala dinámica para que la placa siempre quepa en pantalla
            const maxPx = window.innerWidth < 600 ? 300 : 500;
            const scale = Math.min(maxPx / boardW, maxPx / boardH);
            
            canvas.width = boardW * scale;
            canvas.height = boardH * scale;

            // Dibujar fondo (Placa)
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar piezas
            ctx.fillStyle = '#3498db'; // Color azul para las piezas
            ctx.strokeStyle = '#2c3e50'; // Borde oscuro
            ctx.lineWidth = 1;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = c * pieceW * scale;
                    const y = r * pieceH * scale;
                    const width = pieceW * scale;
                    const height = pieceH * scale;

                    ctx.fillRect(x, y, width, height);
                    ctx.strokeRect(x, y, width, height);
                }
            }
        }

        // Estado inicial del canvas al cargar la página
        window.onload = function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#bdc3c7';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Ingresa medidas y calcula', canvas.width/2, canvas.height/2);
        }
    </script>
</body>
</html>
